<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swish</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      text-align: center;
      padding: 40px;
    }
    .box {
      background: white;
      max-width: 400px;
      margin: auto;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    h1 {
      color: #111;
    }
    .demo {
      color: red;
      font-weight: bold;
    }
    button {
      background: #111;
      color: white;
      border: none;
      padding: 14px 20px;
      border-radius: 10px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Demo/Test App</h1>
    <p class="demo">Detta är bara en demo/test-sida.</p>
    <p>Ingen riktig betalning sker här.</p>
    <button>Test-knapp</button>
  </div>
</body>
</html>
